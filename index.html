<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ヨットゲーム</title>
    <style>
        body { display: flex; background: #5c4033; color: white; padding: 20px; font-family: sans-serif; }
        #score-board { width: 350px; background: #fffaf0; color: #333; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        .clickable { cursor: pointer; background: #e0f7fa; }
        
        #game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #tray { width: 350px; height: 350px; border-radius: 50%; border: 15px solid #333; background: #b22222; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; padding: 20px; }
        .die { width: 60px; height: 60px; background: white; color: black; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; cursor: pointer; }
        .die.selected { outline: 4px solid gold; background: #ffeb3b; }
        
        #controls { margin-top: 30px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

<div id="score-board">
    <h3>ターン <span id="turn">1</span>/12</h3>
    <table>
        <tr><th>役名</th><th>自分</th><th>CPU</th></tr>
        <tbody id="score-rows"></tbody>
    </table>
    <p>合計点: <span id="my-total">0</span> vs <span id="cpu-total">0</span></p>
</div>

<div id="game-area">
    <div id="tray"></div>
    <div id="controls">
        <button id="roll-btn" onclick="rollDice()">ふりなおす</button>
    </div>
    <p>残り回数: <span id="rolls-left">3</span></p>
</div>

<script>
    const categories = ['エース', 'デュース', 'トレイ', 'フォー', 'ファイブ', 'シックス', 'チョイス', '4カード', 'フルハウス', 'Sストレート', 'Lストレート', 'ヨット'];
    let dice = [1, 1, 1, 1, 1], selected = [false, false, false, false, false], rolls = 3, turn = 1;
    let myScores = Array(12).fill(null), cpuScores = Array(12).fill(null);

    // 役判定ロジック
    function calcScore(dice, catIdx) {
        const counts = Array(7).fill(0); dice.forEach(d => counts[d]++);
        const sum = dice.reduce((a, b) => a + b, 0);
        
        if (catIdx < 6) return counts[catIdx + 1] * (catIdx + 1);
        if (catIdx === 6) return sum;
        if (catIdx === 7) return counts.some(c => c >= 4) ? sum : 0;
        if (catIdx === 8) return (counts.includes(3) && counts.includes(2)) || counts.includes(5) ? 25 : 0;
        if (catIdx === 9) return (counts[1]&&counts[2]&&counts[3]&&counts[4]) || (counts[2]&&counts[3]&&counts[4]&&counts[5]) || (counts[3]&&counts[4]&&counts[5]&&counts[6]) ? 15 : 0;
        if (catIdx === 10) return (counts[1]&&counts[2]&&counts[3]&&counts[4]&&counts[5]) || (counts[2]&&counts[3]&&counts[4]&&counts[5]&&counts[6]) ? 30 : 0;
        if (catIdx === 11) return counts.some(c => c === 5) ? 50 : 0;
        return 0;
    }

    function initTable() {
        const tbody = document.getElementById('score-rows');
        categories.forEach((cat, i) => {
            tbody.innerHTML += `<tr><td>${cat}</td><td id="my-${i}" class="clickable" onclick="playerPick(${i})">-</td><td id="cpu-${i}">-</td></tr>`;
        });
    }

    function updateUI() {
        document.getElementById('tray').innerHTML = dice.map((d, i) => `<div class="die ${selected[i] ? 'selected' : ''}" onclick="selected[${i}]=!selected[${i}];updateUI()">${d}</div>`).join('');
        document.getElementById('rolls-left').innerText = rolls;
        document.getElementById('turn').innerText = turn;
    }

    function rollDice() {
        if (rolls <= 0) return;
        dice = dice.map((d, i) => selected[i] ? d : Math.floor(Math.random() * 6) + 1);
        rolls--;
        selected = [false, false, false, false, false];
        updateUI();
    }

    function playerPick(idx) {
        if (myScores[idx] !== null || rolls === 3) return;
        myScores[idx] = calcScore(dice, idx);
        document.getElementById(`my-${idx}`).innerText = myScores[idx];
        document.getElementById(`my-${idx}`).classList.remove('clickable');
        
        cpuPlay();
        turn++; rolls = 3; dice = [1, 1, 1, 1, 1];
        if (turn > 12) alert("終了！結果: " + myScores.reduce((a,b)=>a+(b||0),0));
        updateUI();
    }

    function cpuPlay() {
        let idx = cpuScores.findIndex(s => s === null); // 空いている場所にランダムに配置
        cpuScores[idx] = calcScore(dice, idx);
        document.getElementById(`cpu-${idx}`).innerText = cpuScores[idx];
    }

    initTable(); updateUI();
</script>
</body>
</html>
