<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ヨットゲーム</title>
    <style>
        body { display: flex; background: #5c4033; color: #333; padding: 20px; font-family: sans-serif; gap: 20px; }
        
        /* スコアシート */
        #score-board { width: 320px; background: #fffdf5; border: 2px solid #333; padding: 10px; }
        .header-row { display: flex; align-items: center; border-bottom: 2px solid #333; padding-bottom: 5px; margin-bottom: 10px; }
        .turn-info { flex: 1; font-weight: bold; }
        .player-name { width: 50px; text-align: center; font-size: 0.8em; font-weight: bold; }
        
        .table { display: grid; grid-template-columns: 2fr 1fr 1fr; border: 2px solid #333; }
        .cell { border: 1px solid #333; padding: 6px; text-align: center; }
        .header-cell { background: #333; color: white; font-size: 0.9em; }
        .score-cell { background: #ffe97d; font-weight: bold; cursor: pointer; }
        .subtotal-row { background: #777; color: white; font-weight: bold; }
        .bonus-row { grid-column: 1/4; font-size: 0.75em; text-align: left; padding: 4px; background: #eee; }

        /* ゲームエリア */
        #game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #tray { width: 350px; height: 350px; border-radius: 50%; border: 15px solid #333; background: #b22222; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; padding: 20px; }
        .die { width: 60px; height: 60px; background: white; color: black; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; cursor: pointer; }
        .die.selected { outline: 4px solid gold; background: #ffeb3b; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div id="score-board">
    <div class="header-row">
        <div class="turn-info">ターン <span id="current-turn">1</span>/12</div>
        <div class="player-name">プレイヤーA</div>
        <div class="player-name">プレイヤーB</div>
    </div>
    <div class="table">
        <div class="cell header-cell">役名</div><div class="cell header-cell">A</div><div class="cell header-cell">B</div>
        <script>
            const cats = ['エース', 'デュース', 'トレイ', 'フォー', 'ファイブ', 'シックス', 'チョイス', 'フォーダイス', 'フルハウス', 'S.ストレート', 'B.ストレート', 'ヨット'];
            cats.forEach((c, i) => {
                document.write(`<div class="cell">${c}</div><div class="cell score-cell" onclick="pick(${i})" id="my-${i}">-</div><div class="cell" id="cpu-${i}">-</div>`);
            });
        </script>
        <div class="cell subtotal-row">小計</div><div class="cell subtotal-row" id="my-sub">-</div><div class="cell subtotal-row" id="cpu-sub">-</div>
        <div class="bonus-row">■～■の合計が63点以上でボーナス+35</div>
        <div class="cell header-cell">総合得点</div><div class="cell score-cell" id="my-total">0</div><div class="cell score-cell" id="cpu-total">0</div>
    </div>
</div>

<div id="game-area">
    <div id="tray"></div>
    <button onclick="rollDice()">ふりなおす</button>
    <p>残り回数: <span id="rolls-left">3</span></p>
</div>

<script>
    let dice = [1, 1, 1, 1, 1], selected = [false, false, false, false, false], rolls = 3, turn = 1;
    let myScores = Array(12).fill(null);

    function updateUI() {
        document.getElementById('tray').innerHTML = dice.map((d, i) => 
            `<div class="die ${selected[i] ? 'selected' : ''}" onclick="selected[${i}]=!selected[${i}];updateUI()">${d}</div>`
        ).join('');
        document.getElementById('rolls-left').innerText = rolls;
        document.getElementById('current-turn').innerText = turn;
    }

    function rollDice() {
        if (rolls <= 0) return;
        dice = dice.map((d, i) => selected[i] ? d : Math.floor(Math.random() * 6) + 1);
        rolls--; selected = [false, false, false, false, false];
        updateUI();
    }

    function pick(i) {
        if (myScores[i] !== null || rolls === 3) return;
        myScores[i] = Math.floor(Math.random() * 30); // 仮のスコア計算
        document.getElementById(`my-${i}`).innerText = myScores[i];
        turn++; rolls = 3; updateUI();
    }

    updateUI();
</script>
</body>
</html>
